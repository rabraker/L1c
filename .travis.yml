language: c

dist: bionic
before_install:
        - sudo apt-get update
        
install:
        # There is something proken with the pyenv/shims that screws up cmake.
        - export PATH=${PATH/:\/opt\/pyenv\/shims/}
        - sudo apt-get install -y wget
        - wget https://github.com/Kitware/CMake/releases/download/v3.15.0/cmake-3.15.0-Linux-x86_64.sh
        - sudo bash cmake-3.15.0-Linux-x86_64.sh --prefix=/home/travis/.local --skip-license
        - sudo apt-get install -y libopenblas-base libopenblas-dev
        - sudo apt-get install -y python3 python3-numpy python3-scipy python3-dev python3-setuptools
        - sudo apt-get install -y libfftw3-3 libfftw3-dev check pkg-config
        - pkg-config --libs check
        - sudo apt-get install -y libsubunit0
        - git clone https://github.com/DaveGamble/cJSON.git && cd cJSON
        - make
        - sudo make install
        - ls /usr/local/include
        - ls /usr/local/lib
        - cd ../
        - sudo ldconfig

script:
        - cmake --version
        - echo $PATH
        - type -p python3
        - python3 --version
        - mkdir build
        - cd build
        - cmake -DENABLE_PYTHON=1 -DPython3_ROOT_DIR=/usr/bin/python3 ../
        - make
        - OMP_NUM_THREADS=4 make test


